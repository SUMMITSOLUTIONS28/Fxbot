name: Build Full Trading Bot APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - run: yes | sdkmanager --licenses

      - run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Create Project
        run: |
          mkdir -p app/src/main/java/com/trading/fullbot
          mkdir -p app/src/main/res/values

# ========================= MAIN ACTIVITY =========================
          cat > app/src/main/java/com/trading/fullbot/MainActivity.java << 'EOF'
          package com.trading.fullbot;

          import android.content.*;
          import android.os.Bundle;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  LinearLayout layout = new LinearLayout(this);
                  layout.setOrientation(LinearLayout.VERTICAL);

                  EditText apiKey = new EditText(this);
                  apiKey.setHint("API KEY");

                  EditText secret = new EditText(this);
                  secret.setHint("API SECRET");

                  Button start = new Button(this);
                  start.setText("START BOT");

                  layout.addView(apiKey);
                  layout.addView(secret);
                  layout.addView(start);

                  setContentView(layout);

                  SharedPreferences p = getSharedPreferences("bot", MODE_PRIVATE);

                  apiKey.setText(p.getString("key",""));
                  secret.setText(p.getString("secret",""));

                  start.setOnClickListener(v -> {
                      p.edit()
                       .putString("key", apiKey.getText().toString())
                       .putString("secret", secret.getText().toString())
                       .apply();

                      startForegroundService(new Intent(this, TradingService.class));
                      Toast.makeText(this,"Bot Started",Toast.LENGTH_SHORT).show();
                  });
              }
          }
          EOF

# ========================= SERVICE =========================
          cat > app/src/main/java/com/trading/fullbot/TradingService.java << 'EOF'
          package com.trading.fullbot;

          import android.app.*;
          import android.content.SharedPreferences;
          import android.os.*;
          import androidx.core.app.NotificationCompat;

          import org.json.JSONArray;

          import javax.crypto.Mac;
          import javax.crypto.spec.SecretKeySpec;

          import java.io.*;
          import java.net.*;
          import java.security.MessageDigest;
          import java.util.*;

          public class TradingService extends Service {

              private boolean running = true;
              private int openTrades = 0;
              private int lossCount = 0;

              private final String[] PAIRS = {
                      "EURUSDT","GBPUSDT","AUDUSDT","NZDUSDT","BTCUSDT"
              };

              private final String[] HTF = {"45m","30m","15m","5m"};

              @Override
              public void onCreate() {
                  super.onCreate();

                  NotificationChannel channel = new NotificationChannel(
                          "bot","Trading Bot",NotificationManager.IMPORTANCE_LOW);

                  getSystemService(NotificationManager.class).createNotificationChannel(channel);

                  Notification n = new NotificationCompat.Builder(this,"bot")
                          .setContentTitle("Trading Bot Running")
                          .setContentText("Live trading active")
                          .setSmallIcon(android.R.drawable.ic_dialog_info)
                          .build();

                  startForeground(1,n);

                  new Thread(this::runBot).start();
              }

              private JSONArray getCandles(String symbol, String tf) throws Exception {
                  URL url = new URL("https://api.binance.com/api/v3/klines?symbol="+symbol+"&interval="+tf+"&limit=50");
                  HttpURLConnection conn = (HttpURLConnection) url.openConnection();

                  BufferedReader r = new BufferedReader(new InputStreamReader(conn.getInputStream()));
                  StringBuilder res = new StringBuilder();
                  String line;

                  while ((line = r.readLine()) != null) res.append(line);

                  return new JSONArray(res.toString());
              }

              private String detectSweep(JSONArray d) throws Exception {
                  int len = d.length();
                  JSONArray p = d.getJSONArray(len-2);
                  JSONArray c = d.getJSONArray(len-1);

                  double ph = p.getDouble(2);
                  double pl = p.getDouble(3);

                  double h = c.getDouble(2);
                  double l = c.getDouble(3);
                  double cl = c.getDouble(4);

                  if (h > ph && cl < ph) return "SELL";
                  if (l < pl && cl > pl) return "BUY";

                  return null;
              }

              private String detectCHOCH(JSONArray d) throws Exception {
                  int len = d.length();

                  double h1 = d.getJSONArray(len-1).getDouble(2);
                  double h3 = d.getJSONArray(len-3).getDouble(2);

                  double l1 = d.getJSONArray(len-1).getDouble(3);
                  double l3 = d.getJSONArray(len-3).getDouble(3);

                  if (h1 > h3) return "BUY";
                  if (l1 < l3) return "SELL";

                  return null;
              }

              private void runBot() {
                  SharedPreferences p = getSharedPreferences("bot", MODE_PRIVATE);

                  while (running) {
                      try {

                          if (lossCount >= 3) return;
                          if (openTrades >= 3) continue;

                          for (String pair : PAIRS) {

                              for (String tf : HTF) {

                                  String sweep = detectSweep(getCandles(pair, tf));
                                  if (sweep == null) continue;

                                  String choch1 = detectCHOCH(getCandles(pair,"1m"));
                                  String choch2 = detectCHOCH(getCandles(pair,"3m"));

                                  if (choch1 == null && choch2 == null) continue;

                                  double rr;

                                  if (tf.equals("45m") || tf.equals("30m")) rr = 4;
                                  else if (tf.equals("15m")) rr = (choch1 != null) ? 4 : 3;
                                  else rr = (choch1 != null) ? 3 : 3.5;

                                  executeTrade(pair, sweep, rr, p);
                                  openTrades++;
                                  break;
                              }
                          }

                          Thread.sleep(60000);

                      } catch (Exception e) {
                          e.printStackTrace();
                      }
                  }
              }

              private void executeTrade(String pair, String side, double rr, SharedPreferences p) {
                  String key = p.getString("key","");
                  String secret = p.getString("secret","");

                  System.out.println("EXECUTING " + pair + " " + side + " RR=" + rr);

                  // 🔴 SIGNED ORDER LOGIC SHOULD GO HERE
              }

              @Override
              public IBinder onBind(Intent intent) { return null; }
          }
          EOF

# ========================= MANIFEST =========================
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>

              <application android:label="FullTradingBot">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>

                  <service android:name=".TradingService"/>
              </application>
          </manifest>
          EOF

# ========================= GRADLE =========================
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
          }
          EOF

          cat > settings.gradle << 'EOF'
          dependencyResolutionManagement {
              repositories { google(); mavenCentral() }
          }
          include ':app'
          EOF

          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'

          android {
              namespace 'com.trading.fullbot'
              compileSdk 34

              defaultConfig {
                  applicationId "com.trading.fullbot"
                  minSdk 21
                  targetSdk 34
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - run: |
          gradle wrapper --gradle-version 8.0
          chmod +x gradlew

      - run: ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: FULL-TRADING-BOT-APK
          path: app/build/outputs/apk/debug/*.apk
